# Public, unauthenticated liveness endpoint for the external Cloudflare Worker
# dead-man's-switch (ops/heartbeat-worker/). Exposes ONLY /health from the web
# gateway; everything else 404s so no dashboard/API surface leaks unauthenticated.
http://health.chrispiserchia.com {
    handle /health {
        reverse_proxy localhost:8080
    }
    handle {
        respond 404
    }
}
